# Suggested PostgreSQL tuning for a single 8C16G server running this app.
# Install on Ubuntu/PostgreSQL 16 as:
#   /etc/postgresql/16/main/conf.d/ai-agent-platform.conf
# Then restart PostgreSQL.

max_connections = 200
shared_buffers = '4GB'
effective_cache_size = '12GB'
maintenance_work_mem = '512MB'
work_mem = '8MB'
wal_buffers = '16MB'
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200
