<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择 · 阿川 AI 超级助手</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #F3EFE4;
    --bg-tint: #EBE6D7;
    --bg-card: #FAF6EC;
    --ink: #1A1814;
    --ink-mid: #48433B;
    --ink-soft: #6B6558;
    --ink-mute: #A39B8A;
    --gold: #9A7A3D;
    --line: rgba(26,24,20,.14);
    --line-strong: rgba(26,24,20,.28);

    --serif-en: 'Instrument Serif', Georgia, serif;
    --serif-cn: 'Noto Serif SC', 'Songti SC', serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

    --ease: cubic-bezier(.2,.65,.25,1);
    --ease-long: cubic-bezier(.16,.84,.28,1);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  a{color: inherit; text-decoration: none}
  button{font-family: inherit; cursor: pointer; border: none; background: none; color: inherit}

  /* 背景巨型水印字 */
  body::before{
    content: '阿';
    position: fixed;
    bottom: -8vh; right: -4vw;
    font-family: var(--serif-cn);
    font-size: clamp(400px, 52vw, 720px);
    line-height: 0.8;
    color: var(--ink);
    opacity: 0.03;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  /* ═══════════════════════════════════════════ */
  /*  TOP BAR                                    */
  /* ═══════════════════════════════════════════ */
  .topbar{
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: 22px 36px;
    display: flex; align-items: center; justify-content: space-between;
    background: transparent;
  }
  .brand{
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif-cn);
    font-size: 17px; font-weight: 500;
    color: var(--ink);
  }
  .brand-mark{
    width: 32px; height: 32px; border-radius: 5px;
    background: var(--ink); color: var(--bg);
    display: grid; place-items: center;
    font-family: var(--serif-cn);
    font-size: 16px; font-weight: 600;
  }

  /* 用户菜单 */
  .user-menu{ position: relative; }
  .user-btn{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 6px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: transparent;
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .12em;
    color: var(--ink-mid);
    text-transform: uppercase;
    cursor: pointer;
    transition: all .25s var(--ease);
  }
  .user-btn:hover{
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .user-avatar{
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--gold); color: var(--bg);
    display: grid; place-items: center;
    font-size: 10px; font-weight: 600;
    font-family: var(--sans);
  }
  .user-btn:hover .user-avatar{
    background: var(--bg); color: var(--ink);
  }
  .user-btn .arrow{
    font-size: 9px;
    opacity: .7;
  }

  .dropdown{
    position: absolute;
    top: calc(100% + 8px); right: 0;
    min-width: 180px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(26,24,20,.08);
    opacity: 0; transform: translateY(-4px);
    pointer-events: none;
    transition: all .2s var(--ease);
  }
  .dropdown.show{
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .dropdown-item{
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all .15s var(--ease);
  }
  .dropdown-item:hover{
    background: var(--bg-tint);
    color: var(--ink);
  }
  .dropdown-item.danger{ color: #B24A3B; }
  .dropdown-item.danger:hover{
    background: rgba(178,74,59,.08);
    color: #B24A3B;
  }
  .dropdown-divider{
    height: 1px;
    background: var(--line);
    margin: 4px 0;
  }
  .dropdown-item .ic{
    width: 16px; text-align: center;
    font-size: 12px;
    opacity: .6;
  }

  /* ═══════════════════════════════════════════ */
  /*  MAIN STAGE                                 */
  /* ═══════════════════════════════════════════ */
  .stage{
    height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 100px 40px 60px;
    position: relative;
    z-index: 1;
  }

  /* 上方文字区 */
  .hero{
    text-align: center;
    margin-bottom: 60px;
    opacity: 0; transform: translateY(14px);
    animation: rise .9s var(--ease) .1s forwards;
  }
  .hero-eyebrow{
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .22em;
    color: var(--ink-mid);
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .hero-eyebrow::before,
  .hero-eyebrow::after{
    content: ''; display: block;
    width: 30px; height: 1px;
    background: var(--ink-mid);
  }
  .hero-title{
    font-family: var(--serif-cn);
    font-weight: 500;
    font-size: clamp(38px, 5vw, 64px);
    line-height: 1.1;
    letter-spacing: -.02em;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .hero-title .period{
    color: var(--gold);
    animation: blinkPeriod 3.4s ease-in-out infinite;
  }
  @keyframes blinkPeriod{
    0%,60%,100%{ opacity: 1; }
    72%{ opacity: .35; }
  }
  .hero-sub{
    font-family: var(--serif-cn);
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .hero-sub em{
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--gold);
    font-size: 1.1em;
  }

  /* 两张卡片 */
  .zones{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 820px;
    width: 100%;
  }

  .zone-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 40px 36px 32px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all .35s var(--ease-long);
    display: flex; flex-direction: column;
    min-height: 340px;
    opacity: 0; transform: translateY(20px);
    animation: rise 1s var(--ease) forwards;
  }
  .zone-card:nth-child(1){ animation-delay: .3s; }
  .zone-card:nth-child(2){ animation-delay: .4s; }

  .zone-card:hover{
    border-color: var(--ink);
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(26,24,20,.08);
  }

  .zone-card.disabled{
    cursor: not-allowed;
    opacity: 0.6;
  }
  .zone-card.disabled:hover{
    transform: none;
    border-color: var(--line);
    box-shadow: none;
  }

  .zone-num{
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .22em;
    color: var(--ink-mute);
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .zone-num::before{
    content: ''; display: block;
    width: 28px; height: 1px;
    background: var(--ink-mute);
  }

  .zone-title-cn{
    font-family: var(--serif-cn);
    font-weight: 500;
    font-size: 38px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -.015em;
  }
  .zone-title-en{
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .zone-desc{
    font-family: var(--serif-cn);
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.75;
    margin-bottom: auto;
    max-width: 260px;
  }

  .zone-cta{
    margin-top: 32px;
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .2em;
    color: var(--ink);
    text-transform: uppercase;
    font-weight: 500;
    transition: all .25s var(--ease);
  }
  .zone-cta .arr{
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 15px;
    transition: transform .25s var(--ease);
  }
  .zone-card:hover .zone-cta .arr{
    transform: translateX(4px);
  }

  .zone-badge{
    position: absolute;
    top: 24px; right: 24px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 9.5px; letter-spacing: .14em;
    color: var(--bg);
    background: var(--ink);
    border-radius: 999px;
    text-transform: uppercase;
  }
  .zone-badge.soon{
    background: var(--ink-mute);
  }
  .zone-badge.live{
    background: var(--gold);
  }

  /* 装饰字母（卡片背景）*/
  .zone-card::before{
    content: attr(data-letter);
    position: absolute;
    bottom: -40px; right: -20px;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 220px;
    color: var(--ink);
    opacity: 0.04;
    line-height: 1;
    pointer-events: none;
    transition: opacity .4s var(--ease);
  }
  .zone-card:hover::before{ opacity: 0.06; }

  /* 底部提示 */
  .foot-note{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px; letter-spacing: .2em;
    color: var(--ink-mute);
    text-transform: uppercase;
    z-index: 2;
    pointer-events: none;
  }

  @keyframes rise{ to { opacity: 1; transform: translateY(0); } }

  /* ═══════════════════════════════════════════ */
  /*  RESPONSIVE                                 */
  /* ═══════════════════════════════════════════ */
  @media (max-width: 780px){
    body{ overflow: auto; }
    .stage{ height: auto; min-height: 100vh; padding: 90px 24px 80px; }
    .zones{ grid-template-columns: 1fr; gap: 16px; }
    .zone-card{ min-height: 240px; padding: 32px 28px 28px; }
    .zone-title-cn{ font-size: 32px; }
    .zone-title-en{ font-size: 18px; }
    .topbar{ padding: 14px 18px; }
    .brand{ font-size: 15px; }
    .user-btn span:not(.arrow){ display: none; }
    .hero{ margin-bottom: 40px; }
    .foot-note{ display: none; }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a href="landing.html" class="brand">
    <span class="brand-mark">阿</span>
    <span>阿川 AI 超级助手</span>
  </a>
  <div class="user-menu">
    <button class="user-btn" id="userBtn">
      <span class="user-avatar" id="userAvatar">U</span>
      <span id="userName">加载中</span>
      <span class="arrow">▾</span>
    </button>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" onclick="location.href='profile.html'">
        <span class="ic">👤</span> 个人中心
      </div>
      <div class="dropdown-item" onclick="location.href='member.html'">
        <span class="ic">⭐</span> 会员中心
      </div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-item danger" onclick="logout()">
        <span class="ic">↗</span> 退出登录
      </div>
    </div>
  </div>
</div>

<!-- Main stage -->
<div class="stage">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-eyebrow">Welcome back · 欢迎回来</div>
    <h1 class="hero-title">选择你的<br>工作方向<span class="period">。</span></h1>
    <p class="hero-sub">从内容到项目，<em>随时开始。</em></p>
  </div>

  <!-- Two zone cards -->
  <div class="zones">

    <div class="zone-card" data-letter="W" onclick="goFunction()">
      <div class="zone-num">Zone 01</div>
      <div class="zone-title-cn">工作台</div>
      <div class="zone-title-en">Workspace</div>
      <p class="zone-desc">
        AI 工具 · 高效创作<br>
        写作、分析、编程、设计<br>
        一个入口，所有能力。
      </p>
      <div class="zone-cta">
        进入工作台 <span class="arr">→</span>
      </div>
    </div>

    <div class="zone-card" data-letter="P" onclick="goPractice()">
      <div class="zone-badge live">Now Live</div>
      <div class="zone-num">Zone 02</div>
      <div class="zone-title-cn">实战区</div>
      <div class="zone-title-en">Practice</div>
      <p class="zone-desc">
        实战教程 · 项目案例<br>
        课程专栏 · 持续更新<br>
        跟着做，拿到结果。
      </p>
      <div class="zone-cta">
        进入实战区 <span class="arr">→</span>
      </div>
    </div>

  </div>

</div>

<!-- Foot -->
<div class="foot-note">阿川同学 · 2026</div>

<script>
  // ═══════════════════════════════════════════
  //  登录态校验
  // ═══════════════════════════════════════════
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.replace('login.html');
  }

  // ═══════════════════════════════════════════
  //  获取用户信息
  // ═══════════════════════════════════════════
  async function loadUserInfo() {
    try {
      const res = await fetch('/member/info', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) {
        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.replace('login.html');
          return;
        }
        return;
      }
      const data = await res.json();
      const phone = data.phone || '';
      const displayName = phone ? phone.slice(-4) : '用户';
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userAvatar').textContent = displayName[0] || 'U';
    } catch (e) {
      console.error('加载用户信息失败', e);
    }
  }
  loadUserInfo();

  // ═══════════════════════════════════════════
  //  跳转
  // ═══════════════════════════════════════════
  function goFunction() {
    window.location.href = 'index.html';
  }
  function goPractice() {
    window.location.href = 'practice.html';
  }

  // ═══════════════════════════════════════════
  //  下拉菜单
  // ═══════════════════════════════════════════
  const userBtn = document.getElementById('userBtn');
  const dropdown = document.getElementById('dropdown');

  userBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('show');
  });
  document.addEventListener('click', () => {
    dropdown.classList.remove('show');
  });

  // ═══════════════════════════════════════════
  //  退出登录
  // ═══════════════════════════════════════════
  function logout() {
    if (confirm('确定要退出登录吗？')) {
      localStorage.removeItem('token');
      window.location.replace('login.html');
    }
  }
</script>

</body>
</html>
